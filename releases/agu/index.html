<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>АГУ — Ламопад</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      /* На мобайле 100vh не учитывает адресную строку; fill-available исправляет */
      min-height: -webkit-fill-available;
      background: #060608;
      overflow: hidden;
      position: fixed;
      top: 0; left: 0;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
'use strict';

const BASE_SPEED = 100; // px/sec

// ─── Helpers ──────────────────────────────────────────────────────────────────

function makeTile(scene, key, w, h, paint) {
  const g = scene.make.graphics({ add: false });
  paint(g, w, h);
  g.generateTexture(key, w, h);
  g.destroy();
}

/** Затемнить hex-цвет на `amt` по каждому каналу. */
function darker(col, amt) {
  const r = Math.max(0, ((col >> 16) & 0xff) - amt);
  const g = Math.max(0, ((col >>  8) & 0xff) - amt);
  const b = Math.max(0, ( col        & 0xff) - amt);
  return (r << 16) | (g << 8) | b;
}

// ─── Думерская панелька ───────────────────────────────────────────────────────

/**
 * Рисует жилой дом (панель/монолит) в думерской эстетике.
 * Грязный советский бетон, редкие тёплые окна, потёки.
 *
 * @param {Phaser.GameObjects.Graphics} g
 * @param {number} x, groundY, w, h  — позиция и габариты
 * @param {number} wallCol           — базовый цвет стены
 * @param {number} floors, cols      — сетка окон
 * @param {object} [opts]            — { stains: [{x,w,h}], roofColor }
 */
function drawPanelka(g, x, groundY, w, h, wallCol, floors, cols, opts) {
  const o = opts || {};
  const top    = groundY - h;
  const PAD_X  = 7, PAD_TOP = 7, PAD_BOT = 14;
  const GAP_X  = 3, GAP_Y   = 3;

  // стена
  g.fillStyle(wallCol, 1);
  g.fillRect(x, top, w, h);

  // горизонтальные швы между панелями (тёмные щели)
  g.fillStyle(darker(wallCol, 18), 1);
  for (let fl = 0; fl < floors; fl++) {
    const sy = top + PAD_TOP + fl * Math.floor((h - PAD_TOP - PAD_BOT) / floors);
    g.fillRect(x, sy - 1, w, 1);
  }

  // потёки/следы воды (вертикальные тёмные полосы)
  const stains = o.stains || [
    { dx: Math.floor(w * 0.18), sw: 2, sh: Math.floor(h * 0.55) },
    { dx: Math.floor(w * 0.52), sw: 1, sh: Math.floor(h * 0.35) },
    { dx: Math.floor(w * 0.73), sw: 2, sh: Math.floor(h * 0.70) },
  ];
  g.fillStyle(darker(wallCol, 22), 1);
  for (const s of stains) g.fillRect(x + s.dx, top, s.sw, s.sh);

  // парапет крыши
  const roofCol = o.roofColor !== undefined ? o.roofColor : darker(wallCol, 28);
  g.fillStyle(roofCol, 1);
  g.fillRect(x, top, w, 3);

  // лифтовой холл / технический объём на крыше
  const shW = Math.floor(w * 0.17);
  g.fillStyle(roofCol, 1);
  g.fillRect(x + Math.floor((w - shW) / 2), top - 5, shW, 5);

  // сетка окон
  const availW = w - 2 * PAD_X;
  const availH = h - PAD_TOP - PAD_BOT;
  const winW = Math.max(4, Math.floor((availW - (cols - 1) * GAP_X) / cols));
  const winH = Math.max(4, Math.floor((availH - (floors - 1) * GAP_Y) / floors));

  for (let r = 0; r < floors; r++) {
    for (let c = 0; c < cols; c++) {
      const wx = x + PAD_X + c * (winW + GAP_X);
      const wy = top + PAD_TOP + r * (winH + GAP_Y);
      const seed = ((r * 17 + c * 11 + x) * 3) % 100;
      // ~6% окон светятся тёплым янтарным — остальные мёртвые тёмно-синие
      const lit  = seed < 6;
      g.fillStyle(lit ? 0xd4900a : 0x111c24, 1);
      g.fillRect(wx, wy, winW, winH);
      // блик на стекле у погашенных окон
      if (!lit) {
        g.fillStyle(0x1e2e3a, 1);
        g.fillRect(wx, wy, 1, 1);
      }
    }
  }

  // подъезд (тёмный проём)
  const entW = Math.max(8, Math.floor(w * 0.22));
  g.fillStyle(0x0c1018, 1);
  g.fillRect(x + Math.floor((w - entW) / 2), groundY - PAD_BOT, entW, PAD_BOT);
}

// ─── GameScene ────────────────────────────────────────────────────────────────

class GameScene extends Phaser.Scene {
  constructor() { super({ key: 'GameScene' }); }

  create() {
    const W = this.scale.width;   // 480
    const H = this.scale.height;  // 270

    // ── layer4: космос + экзистенция + Зона — 0.1x ──────────────────────────
    // Кафка: система давит сверху. Тарковский: Зона светится снизу.
    // Человек между двух бездн — звёздной и бетонной.
    makeTile(this, 'layer4', 480, H, (g, tw, th) => {

      // ── космическая бездна ────────────────────────────────────────────────
      // Верх: абсолютно тёмный, почти без цвета — пустота
      g.fillStyle(0x03030a, 1);
      g.fillRect(0, 0, tw, th);

      // Плавный переход к горизонту: добавляем чуть зелёного (промышленная Зона)
      // Полосы градиента сверху вниз
      const skyBands = [
        { y:  0, h: 40, c: 0x03030a }, // космос
        { y: 40, h: 30, c: 0x04050c }, // глубокий ноль
        { y: 70, h: 20, c: 0x050810 }, // чуть теплее
        { y: 90, h: 20, c: 0x060c0e }, // намёк на зелёное
        { y:110, h: 18, c: 0x080f0c }, // зона начинается
        { y:128, h: 12, c: 0x0b160e }, // свечение снизу
        { y:140, h: 10, c: 0x101c12 }, // ореол горизонта
      ];
      for (const b of skyBands) {
        g.fillStyle(b.c, 1);
        g.fillRect(0, b.y, tw, b.h);
      }

      // ── звёзды ────────────────────────────────────────────────────────────
      // Детерминированный LCG — каждый раз одна и та же карта звёзд
      let rng = 48271;
      function rand() {
        rng = Math.imul(rng, 1664525) + 1013904223 | 0;
        return (rng >>> 0) / 4294967296;
      }

      // Звёзды только в верхней части (атмосфера скрывает нижние)
      // Плотность убывает к горизонту
      const STAR_ZONE_H = 148; // px от верха, в которых могут быть звёзды
      for (let i = 0; i < 360; i++) {
        const sx = Math.floor(rand() * tw);
        // Гравитация: звёзды гуще вверху, реже внизу
        const t  = rand();
        const sy = Math.floor(t * t * STAR_ZONE_H); // квадратичное распределение
        const br = rand(); // яркость

        let col, sz;
        if      (br < 0.45) { col = 0x1a2035; sz = 1; } // призрачные, почти невидимые
        else if (br < 0.72) { col = 0x384868; sz = 1; } // тусклые
        else if (br < 0.88) { col = 0x6878a8; sz = 1; } // средние
        else if (br < 0.96) { col = 0x9aa8cc; sz = 1; } // яркие
        else                { col = 0xd0dcf4; sz = 2; } // очень яркие

        g.fillStyle(col, 1);
        g.fillRect(sx, sy, sz, sz);

        // Крест-блик у самых ярких (ощущение резкости оптики, как у Тарковского)
        if (br > 0.975) {
          g.fillStyle(0x606888, 1);
          g.fillRect(sx - 1, sy,     1, 1);
          g.fillRect(sx + sz, sy,    1, 1);
          g.fillRect(sx,     sy - 1, 1, 1);
        }
      }

      // ── туманность / Млечный путь — смутная полоса ────────────────────────
      // Очень тихая, как будто её почти нет. Кафка не даёт смотреть вверх.
      const mwY = 18, mwH = 28;
      for (let i = 0; i < 180; i++) {
        const mx = Math.floor(rand() * tw);
        const my = mwY + Math.floor(rand() * mwH);
        if (rand() > 0.55) continue; // разреженность
        g.fillStyle(0x141828, 1);
        g.fillRect(mx, my, 1, 1);
      }

      // ── зелёное свечение горизонта (Зона Тарковского) ─────────────────────
      // Не красиво — тревожно. Как радиация. Как нечто за пределами понимания.
      g.fillStyle(0x0f2214, 1);
      g.fillRect(0, 148, tw, 6);
      g.fillStyle(0x0c1c10, 1);
      g.fillRect(0, 154, tw, 5);
      g.fillStyle(0x09140c, 1);
      g.fillRect(0, 159, tw, 4);

      // ── дальний урбанистический фон (за горизонтом) ───────────────────────
      g.fillStyle(0x060d08, 1);
      g.fillRect(0, 163, tw, th - 163);

      // ── монолиты Кудрово — чёрные силуэты против неба ────────────────────
      // Абсолютно чёрные. Как надгробия. Как буква закона у Кафки.
      const HY = 163;
      const towers = [
        { x:   0, w: 24, h: 70 }, { x:  27, w: 18, h: 88 },
        { x:  48, w: 23, h: 56 }, { x:  74, w: 20, h: 98 },
        { x:  97, w: 28, h: 72 }, { x: 128, w: 16, h: 84 },
        { x: 147, w: 25, h: 60 }, { x: 175, w: 22, h: 95 },
        { x: 200, w: 18, h: 76 }, { x: 221, w: 30, h: 58 },
        { x: 254, w: 20, h: 91 }, { x: 277, w: 24, h: 68 },
        { x: 304, w: 18, h: 97 }, { x: 325, w: 26, h: 74 },
        { x: 354, w: 22, h: 62 }, { x: 379, w: 18, h: 86 },
        { x: 400, w: 25, h: 70 }, { x: 428, w: 20, h: 92 },
        { x: 451, w: 27, h: 78 },
      ];
      for (const t of towers) {
        // Тело: почти чёрное, чуть теплее у основания (городской свет снизу)
        g.fillStyle(0x080c0a, 1);
        g.fillRect(t.x, HY - t.h, t.w, t.h + (th - HY));

        // Ореол вокруг верхушки — здание поглощает свет звёзд
        g.fillStyle(0x060a08, 1);
        g.fillRect(t.x - 1, HY - t.h - 1, t.w + 2, 2);

        // Редкие окна: холодный синеватый свет (флуоресцентные лампы, никто не спит)
        // и изредка — тёплый янтарь (кто-то ещё дома)
        const s0 = t.x * 11 + t.h * 7;
        for (let row = 0; row < Math.floor(t.h / 9); row++) {
          for (let col = 0; col < Math.floor(t.w / 7); col++) {
            const sv = (s0 + row * 17 + col * 13) % 100;
            if (sv > 6) continue; // только 6% светятся
            const cold = sv < 3; // половина — холодный синий, половина — тусклый жёлтый
            g.fillStyle(cold ? 0x4060a0 : 0x806010, 1);
            g.fillRect(t.x + 3 + col * 6, HY - t.h + 5 + row * 8, 2, 2);
          }
        }
      }
    });

    // ── layer3: панельки Кудрово — 0.3x ─────────────────────────────────────
    // Тайл 320 × h3 (149). Прозрачный фон — небо из layer4 видно сквозь зазоры.
    // A (9 эт.): x=0,  w=88,  h=120  | B (12 эт.): x=91, w=118, h=140
    // C (10 эт.): x=212, w=105, h=130 | зазоры 3 px
    const h3 = Math.ceil(H * 0.55); // 149
    makeTile(this, 'layer3', 320, h3, (g, tw, th) => {
      // A: серо-бежевый советский
      drawPanelka(g,   0, th,  88, 120, 0x848078,  9, 4, {
        stains: [{ dx: 12, sw: 2, sh: 70 }, { dx: 50, sw: 1, sh: 45 }, { dx: 72, sw: 2, sh: 80 }],
      });
      // B: тёмный брутальный монолит
      drawPanelka(g,  91, th, 118, 140, 0x706a64, 12, 6, {
        stains: [{ dx: 10, sw: 1, sh: 90 }, { dx: 38, sw: 2, sh: 60 }, { dx: 72, sw: 1, sh: 100 }, { dx: 98, sw: 2, sh: 55 }],
      });
      // C: выцветший бежево-серый
      drawPanelka(g, 212, th, 105, 130, 0x7c7870, 10, 5, {
        stains: [{ dx: 14, sw: 2, sh: 75 }, { dx: 55, sw: 1, sh: 50 }, { dx: 82, sw: 2, sh: 85 }],
      });
    });

    // ── layer2: асфальт — 1x ─────────────────────────────────────────────────
    // Городской тротуар + дорога. Серый, мокрый, немного трещин.
    // Tile 112 × h2. Разметка: пунктирная осевая линия.
    const h1 = Math.ceil(H * 0.12); // 33px — река (спереди, у самого низа)
    const h2 = Math.ceil(H * 0.22); // 60px — дорога прямо над рекой
    makeTile(this, 'layer2', 112, h2, (g, tw, th) => {
      // тротуарная плитка / бордюрная зона (верхние ~30%)
      const sidewalkH = Math.floor(th * 0.30); // 18px
      g.fillStyle(0x4a4844, 1);
      g.fillRect(0, 0, tw, sidewalkH);

      // швы тротуарных плит
      g.fillStyle(0x3a3836, 1);
      for (let x = 0; x < tw; x += 28) g.fillRect(x, 0, 1, sidewalkH);
      g.fillRect(0, Math.floor(sidewalkH / 2), tw, 1);

      // бордюрный камень (поребрик)
      g.fillStyle(0x606058, 1);
      g.fillRect(0, sidewalkH, tw, 3);
      // бликующая грань поребрика
      g.fillStyle(0x787870, 1);
      g.fillRect(0, sidewalkH + 1, tw, 1);

      // асфальт
      const roadY = sidewalkH + 3;
      g.fillStyle(0x282826, 1);
      g.fillRect(0, roadY, tw, th - roadY);

      // лёгкая текстура асфальта — тёмные и светлые пятна
      g.fillStyle(0x242422, 1);
      for (let x = 8; x < tw; x += 22) g.fillRect(x, roadY + 4, 10, 5);
      g.fillStyle(0x2e2e2c, 1);
      for (let x = 0; x < tw; x += 18) g.fillRect(x, roadY + 13, 14, 3);

      // осевая пунктирная линия (белая разметка)
      const markY = roadY + Math.floor((th - roadY) * 0.45); // примерно середина дороги
      g.fillStyle(0xd4d0c4, 1);
      // 3 тире по 24px с отступом 12px → 3*24 + 2*12 = 96px, остаток 16px
      const dashW = 24, dashGap = 16, dashH = 2;
      for (let x = 0; x + dashW <= tw; x += dashW + dashGap) {
        g.fillRect(x, markY, dashW, dashH);
      }

      // правая крайняя линия (жёлтая)
      g.fillStyle(0xb89848, 1);
      g.fillRect(0, roadY, tw, 2);
    });

    // ── layer1: река — 1x ────────────────────────────────────────────────────
    makeTile(this, 'layer1', 128, h1, (g, tw, th) => {
      // Тёмная ночная вода
      g.fillStyle(0x0c2a42, 1);
      g.fillRect(0, 0, tw, th);

      // Градиент: у ватерлинии чуть светлее (отражение неба)
      g.fillStyle(0x183f5c, 1); g.fillRect(0, 0, tw, 3);
      g.fillStyle(0x112e46, 1); g.fillRect(0, 3, tw, 3);

      // Горизонтальные волны — чередование светлых гребней и тёмных впадин
      const waves = [
        { y:  6, h: 2, c: 0x1a4e70 }, { y:  9, h: 1, c: 0x071520 },
        { y: 12, h: 2, c: 0x154060 }, { y: 16, h: 1, c: 0x060f1c },
        { y: 19, h: 2, c: 0x1c5272 }, { y: 23, h: 1, c: 0x071825 },
        { y: 26, h: 2, c: 0x133858 }, { y: 30, h: 1, c: 0x050d18 },
      ];
      for (const w of waves) {
        if (w.y >= th) continue;
        g.fillStyle(w.c, 1);
        g.fillRect(0, w.y, tw, Math.min(w.h, th - w.y));
      }

      // Рябь: короткие случайные штрихи (seeded)
      let rng = 7919;
      const rand = () => { rng = Math.imul(rng, 1664525) + 1013904223 | 0; return (rng >>> 0) / 4294967296; };
      for (let i = 0; i < 55; i++) {
        const rx = Math.floor(rand() * tw);
        const ry = 2 + Math.floor(rand() * (th - 4));
        const rw = 3 + Math.floor(rand() * 16);
        const br = rand();
        const col = br > 0.8 ? 0x2a6a90 : br > 0.5 ? 0x153c58 : 0x060e18;
        g.fillStyle(col, 1);
        g.fillRect(rx, ry, Math.min(rw, tw - rx), 1);
      }

      // Отражения фонарей: прерывистые вертикальные золотые колонки
      const lamps = [22, 68, 108];
      for (const lx of lamps) {
        for (let dy = 0; dy < th; dy++) {
          const gap = Math.floor(1 + dy * 0.2);
          if ((dy + lx) % (gap + 2) < gap) continue;
          const hw = Math.max(1, Math.ceil(2.5 - dy * 0.08));
          g.fillStyle(dy < 5 ? 0xa07828 : 0x6a4c14, 1);
          g.fillRect(lx - hw + 1, dy, hw * 2 - 1, 1);
        }
      }
    });

    // ── TileSprites (порядок = z-порядок: позже = выше) ──────────────────────
    // Стек снизу вверх экрана:  река [h1=33px] | дорога [h2=60px] | панельки | небо
    // Z-порядок (спереди): layer1 > layer2 > layer3 > layer4
    this.tl4 = this.add.tileSprite(0, 0, W, H, 'layer4').setOrigin(0, 0);

    this.tl3 = this.add.tileSprite(0, H - h3, W, h3, 'layer3').setOrigin(0, 0);

    // дорога: y = H - h1 - h2 (прямо над рекой)
    this.tl2 = this.add.tileSprite(0, H - h1 - h2, W, h2, 'layer2').setOrigin(0, 0);

    // река: depth 15 > корабль (8) — при покачивании подводная часть уходит под воду
    this.tl1 = this.add.tileSprite(0, H - h1, W, h1, 'layer1').setOrigin(0, 0).setDepth(15);

    // Синусоидная граница воды — рисуется каждый кадр поверх всего, depth 16
    // Заменяет прямую линию между дорогой и рекой живой волной
    this.waveGfx  = this.add.graphics().setDepth(16);
    this.waveTime = 0;
    this.waterY   = H - h1;   // номинальная y ватерлинии

    // ── Состояние ламы ────────────────────────────────────────────────────────
    this.state = {
      health: 100, money: 0, age: 0, speed: 1.0,
      isBowing: false, isSprinting: false, isCrying: false,
    };

    // ── Лама-бурлак ───────────────────────────────────────────────────────────
    const LX   = 195;                   // x ламы (фиксирован, мир скроллится)
    const GY   = H - h1 - h2;          // y поверхности дороги (верхний край layer2)
    this.GY    = GY;                    // нужен в update для прожектора

    const WOOL  = 0xf0e8d0;  // кремовая шерсть
    const WOOL2 = 0xd8c9a8;  // чуть темнее — ноги, уши
    const HOOF  = 0x3e2c1a;  // копыта

    // Статичные части: тело, шея, голова, ухо, морда, глаз, соска
    this.llamaBody = this.add.graphics().setDepth(10);
    const lb = this.llamaBody;

    lb.fillStyle(WOOL, 1);
    lb.fillRect(LX - 20, GY - 30, 40, 16);   // тело
    lb.fillRect(LX + 13, GY - 47, 8,  17);   // шея
    lb.fillRect(LX + 11, GY - 58, 20, 13);   // голова

    lb.fillStyle(WOOL2, 1);
    lb.fillRect(LX + 13, GY - 67,  5, 10);   // ухо

    lb.fillStyle(WOOL, 1);
    lb.fillRect(LX + 29, GY - 54, 11,  7);   // морда

    lb.fillStyle(0x0e0808, 1);
    lb.fillRect(LX + 22, GY - 56,  3,  3);   // глаз — смотрит вдаль

    lb.fillStyle(0xee2850, 1);                // соска
    lb.fillCircle(LX + 41, GY - 50, 3);

    // ── Упряжь (лямки) — поверх тела ламы, depth 12 ─────────────────────────
    // Лямка на груди + плечевой ремень + пряжка в точке крепления верёвки
    const hp = this.harnessGfx = this.add.graphics().setDepth(12);
    const HC = 0x52301a;   // тёмная кожа
    const HB = 0x8a5828;   // бронзовая пряжка

    hp.fillStyle(HC, 1);
    hp.fillRect(LX - 20, GY - 25, 33, 3);   // поперечная нагрудная лямка
    hp.fillRect(LX - 19, GY - 30, 3, 18);   // вертикальная лямка (левый бок)

    hp.lineStyle(2, HC, 1);
    hp.lineBetween(LX + 13, GY - 36, LX - 18, GY - 24);  // плечевой ремень (шея→пряжка)

    // Пряжка — точка крепления верёвки
    hp.fillStyle(HC, 1);
    hp.fillCircle(LX - 18, GY - 24, 5);
    hp.fillStyle(HB, 1);
    hp.fillCircle(LX - 18, GY - 24, 3);
    hp.fillStyle(0x0c0808, 1);
    hp.fillCircle(LX - 18, GY - 24, 1);   // отверстие пряжки

    // Четыре ноги — отдельные Graphics-объекты, анимированы через tweens
    const LEG_H = 14, LEG_W = 5;
    const makeLeg = (lx) => {
      const lg = this.add.graphics().setDepth(9);
      lg.fillStyle(WOOL2, 1);
      lg.fillRect(lx, GY - LEG_H, LEG_W, LEG_H);
      lg.fillStyle(HOOF, 1);
      lg.fillRect(lx - 1, GY - 3, LEG_W + 2, 3);
      return lg;
    };

    this.legBL = makeLeg(LX - 18);   // задняя левая
    this.legBR = makeLeg(LX - 10);   // задняя правая
    this.legFL = makeLeg(LX +  9);   // передняя левая
    this.legFR = makeLeg(LX + 17);   // передняя правая

    // Диагональные пары: BL+FR и BR+FL шагают в противофазе
    this.walkTween1 = this.tweens.add({
      targets: [this.legBL, this.legFR],
      y: -5, duration: 260, yoyo: true, repeat: -1, ease: 'Sine.InOut',
    });
    this.walkTween2 = this.tweens.add({
      targets: [this.legBR, this.legFL],
      y: -5, duration: 260, yoyo: true, repeat: -1, delay: 260, ease: 'Sine.InOut',
    });

    // ── Корпорация-корабль — НАСТОЛЬКО ОГРОМНАЯ, что нос не вмещается в экран ─
    // Виден только нижний правый угол носа. Стена денег уходит вверх и влево.
    const waterY     = H - h1;
    // Прямой нос огромного судна: навис сверху вправо над ламой
    // Нос нависает правее вверху и немного отступает внизу у ватерлинии
    const BOW_DECK_X = 148; // x передней кромки палубы (y=0) — правее всего, нависает
    const BOW_WL_X   = 108; // x носа у ватерлинии — чуть отступает назад (типичный форштевень)
    // bowX(y): линия носовой грани идёт от (BOW_DECK_X,0) до (BOW_WL_X,waterY)
    // т.е. нос УХОДИТ ВЛЕВО книзу — прямой нос как у большого судна
    const bowX = (y) => BOW_DECK_X - (BOW_DECK_X - BOW_WL_X) * (y / waterY);

    // Цвета купюры 50 рублей
    const S_SIDE   = 0x1e6070;  // боковой борт (в тени, смотрит вбок)
    const S_BOW    = 0x2e8898;  // поверхность носа (освещена, смотрит вперёд)
    const S_KEEL   = 0x0d3040;  // подводная часть
    const S_BELT   = 0x0b2c3c;  // ватерлинейный пояс
    const S_LINE   = 0x0b2e3e;  // линии сгибов/плит
    const S_PORT   = 0x78c8d8;  // иллюминаторы
    const S_KNECHT = 0x4a8898;  // кнехт (bollard) для верёвки

    this.boatGfx = this.add.graphics().setDepth(8);
    const bg = this.boatGfx;

    // ── Подводный форштевень (тёмный клин в воде) ─────────────────────────────
    bg.fillStyle(S_KEEL, 1);
    // Клин под носом у ватерлинии — уходит в воду вниз-вправо
    bg.fillTriangle(0, waterY,  BOW_WL_X, waterY,  0, H);
    bg.fillTriangle(BOW_WL_X, waterY,  BOW_WL_X + 14, waterY + 18,  0, H);

    // ── Главный борт (боковая грань корпуса) ──────────────────────────────────
    // Заполняем всё пространство ЛЕВЕЕ носовой грани (прямой нос нависает сверху)
    bg.fillStyle(S_SIDE, 1);
    // Прямоугольник от левого края до BOW_WL_X по всей высоте
    bg.fillRect(-10, -10, BOW_WL_X + 10, waterY + 10);
    // Треугольник-нависание: носовая грань от (BOW_WL_X,waterY) до (BOW_DECK_X,0)
    bg.fillTriangle(BOW_WL_X, 0,  BOW_DECK_X, 0,  BOW_WL_X, waterY);

    // ── Носовая грань (наклонная поверхность носа, освещена) ─────────────────
    // Полоса от нависающей кромки палубы (BOW_DECK_X,0) до ватерлинии (BOW_WL_X,waterY)
    bg.fillStyle(S_BOW, 1);
    const FACE_W = 16;  // ширина видимой плоскости носа
    bg.fillTriangle(BOW_DECK_X,          0,
                    BOW_DECK_X + FACE_W, 0,
                    BOW_WL_X,            waterY);

    // ── Ватерлинейный пояс (тёмная полоса вдоль ватерлинии) ──────────────────
    bg.fillStyle(S_BELT, 1);
    bg.fillRect(-10, waterY - 7, BOW_WL_X + 10, 7);

    // ── Горизонтальные линии листов обшивки (складки купюры) ─────────────────
    // Линии идут от левого края до носовой грани на каждом уровне
    bg.lineStyle(1, S_LINE, 1);
    for (let ly = 15; ly < waterY - 8; ly += 18) {
      bg.lineBetween(-10, ly, bowX(ly), ly);
    }

    // ── Иллюминаторы (ряд у ватерлинии) ──────────────────────────────────────
    bg.fillStyle(S_PORT, 1);
    for (let px = 10; px < BOW_WL_X - 18; px += 22) {
      bg.fillCircle(px, waterY - 18, 3);
    }
    // Второй ряд, мельче
    for (let px = 20; px < BOW_WL_X - 30; px += 28) {
      bg.fillCircle(px, waterY - 34, 2);
    }

    // ── Кнехт — точка крепления верёвки (на носовой грани у ватерлинии) ──────
    const KNECHT_X = BOW_WL_X + 2;
    const KNECHT_Y = waterY - 14;
    bg.fillStyle(S_LINE, 1);
    bg.fillRect(KNECHT_X - 4, KNECHT_Y - 5, 9, 9);  // основание
    bg.fillStyle(S_KNECHT, 1);
    bg.fillRect(KNECHT_X - 3, KNECHT_Y - 4, 7, 7);  // верхняя часть
    bg.fillStyle(S_LINE, 1);
    bg.fillRect(KNECHT_X - 5, KNECHT_Y - 2, 11, 3); // перекладина кнехта

    // ── Покачивание корабля на воде ───────────────────────────────────────────
    // Тяжёлое судно: медленный вертикальный дрейф ±5px (период ~2.8с)
    // + лёгкий горизонтальный ±2px (другой период — создаёт ощущение объёма)
    this.boatBob = { y: 0, x: 0 };
    this.tweens.add({
      targets: this.boatBob,
      y: 5,
      duration: 2800,
      yoyo: true,
      repeat: -1,
      ease: 'Sine.InOut',
    });
    this.tweens.add({
      targets: this.boatBob,
      x: 2,
      duration: 3700,
      yoyo: true,
      repeat: -1,
      ease: 'Sine.InOut',
    });

    // ── Верёвка (перерисовывается каждый кадр) ────────────────────────────────
    this.ropeGfx  = this.add.graphics().setDepth(11);
    this.ropeNeck = { x: LX - 18, y: GY - 24 };          // пряжка упряжи ламы
    this.ropeBoat = { x: KNECHT_X, y: KNECHT_Y };         // кнехт корабля (обновляется в update)
    this.knechtBase  = { x: KNECHT_X, y: KNECHT_Y };       // базовые координаты без покачивания
    this.shipEdgeX   = BOW_DECK_X + FACE_W + 4;           // правый край корпуса + запас

    // ── Гальюнная фигура змеи — depth 9, двигается с boatBob ────────────────
    // Готика: тёмная резьба, приглушённая бронза — как русалка на носу корабля
    {
      const C_VOID   = 0x020504;  // бездна
      const C_BODY   = 0x091408;  // тёмный камень — основное тело
      const C_SCALE  = 0x102016;  // поверхность чешуи
      const C_LIT    = 0x172c1c;  // кромка — свет падает сверху
      const C_BRONZE = 0x7a5e08;  // тусклая бронза (корона)
      const C_BRZ_S  = 0x4a3a04;  // тень бронзы
      const C_BRZ_H  = 0x9a7a10;  // редкий блик бронзы
      const C_AMBER  = 0x604c06;  // глаз — мёртвый янтарь

      // Правый (выступающий) край носовой грани: от (164,0) до (108,waterY)
      const fRX = (y) => (BOW_DECK_X + FACE_W) - (BOW_DECK_X + FACE_W - BOW_WL_X) * (y / waterY);

      this.snakeGfx = this.add.graphics().setDepth(9);
      const sg = this.snakeGfx;

      // === Тело: плоские чешуи — как резьба по тёмному дубу ================
      // Каждая чешуя — горизонтальная пластина, освещена только сверху
      for (let ys = 155; ys >= 80; ys -= 8) {
        const cx = fRX(ys);
        sg.fillStyle(C_VOID, 1);
        sg.fillRect(cx - 7, ys - 2, 14, 7);   // тень под чешуёй
        sg.fillStyle(C_BODY, 1);
        sg.fillRect(cx - 7, ys - 3, 13, 6);   // тело чешуи
        sg.fillStyle(C_SCALE, 1);
        sg.fillRect(cx - 6, ys - 3, 11, 2);   // верхняя поверхность
        sg.fillStyle(C_LIT, 1);
        sg.fillRect(cx - 5, ys - 3, 9, 1);    // верхний край (свет)
        sg.fillStyle(C_VOID, 1);
        sg.fillRect(cx - 7, ys + 2, 13, 1);   // разделительная бороздка
      }

      // === Шея — чуть шире, плавный переход к голове =======================
      for (let yn = 78; yn >= 63; yn -= 8) {
        const cx = fRX(yn);
        sg.fillStyle(C_VOID, 1);
        sg.fillRect(cx - 6, yn - 2, 14, 7);
        sg.fillStyle(C_BODY, 1);
        sg.fillRect(cx - 6, yn - 3, 13, 6);
        sg.fillStyle(C_SCALE, 1);
        sg.fillRect(cx - 5, yn - 3, 11, 2);
        sg.fillStyle(C_LIT, 1);
        sg.fillRect(cx - 4, yn - 3, 9, 1);
        // Спинной гребень — маленький треугольный шип
        sg.fillStyle(C_SCALE, 1);
        sg.fillRect(cx + 5, yn - 6, 2, 4);
        sg.fillStyle(C_LIT, 1);
        sg.fillRect(cx + 5, yn - 6, 1, 4);
      }

      // === Голова — виперовидная: широкая сзади, острая спереди =============
      const hX = fRX(46) + 1;   // ≈ 153
      const hY = 46;

      // Черепная коробка (широкая часть)
      sg.fillStyle(C_VOID, 1);
      sg.fillRect(hX - 8, hY - 6, 13, 15);   // тень
      sg.fillStyle(C_BODY, 1);
      sg.fillRect(hX - 8, hY - 7, 12, 14);   // череп
      sg.fillStyle(C_SCALE, 1);
      sg.fillRect(hX - 8, hY - 7, 12, 3);    // верхняя поверхность темени
      sg.fillStyle(C_LIT, 1);
      sg.fillRect(hX - 7, hY - 7, 10, 1);    // край темени

      // Нависающий надбровный гребень — грозный, давящий
      sg.fillStyle(C_VOID, 1);
      sg.fillRect(hX - 9, hY - 5, 15, 2);    // тень гребня
      sg.fillStyle(C_BODY, 1);
      sg.fillRect(hX - 9, hY - 6, 15, 2);    // гребень

      // Верхняя морда — выступает вправо
      sg.fillStyle(C_VOID, 1);
      sg.fillRect(hX + 3, hY - 4, 14, 11);   // тень
      sg.fillStyle(C_BODY, 1);
      sg.fillRect(hX + 3, hY - 5, 13, 9);    // верхняя морда
      sg.fillStyle(C_SCALE, 1);
      sg.fillRect(hX + 3, hY - 5, 13, 2);    // поверхность морды
      sg.fillStyle(C_LIT, 1);
      sg.fillRect(hX + 4, hY - 5, 11, 1);    // кромка морды

      // Нижняя челюсть — слегка опущена (угрожающий оскал, не мультяшный)
      sg.fillStyle(C_VOID, 1);
      sg.fillRect(hX + 5, hY + 4, 12, 8);    // тень
      sg.fillStyle(C_BODY, 1);
      sg.fillRect(hX + 5, hY + 4, 11, 6);    // нижняя челюсть
      sg.fillStyle(C_SCALE, 1);
      sg.fillRect(hX + 5, hY + 9, 11, 1);    // нижний край нижней челюсти

      // === Пасть — узкая тёмная щель, по углу носа (14° ниже горизонтали) ==
      const mX = hX + 15;   // ≈ 168
      const mY = hY + 2;    // ≈ 48
      sg.fillStyle(C_VOID, 1);
      sg.fillRect(mX - 7, mY + 1, 10, 3);    // тёмная щель
      // Один стилетообразный клык — готика
      sg.fillStyle(0xcac8b8, 1);
      sg.fillTriangle(mX - 5, mY + 1, mX - 2, mY + 1, mX - 4, mY + 4);
      // Нижний клык
      sg.fillTriangle(mX - 4, mY + 4, mX - 1, mY + 4, mX - 3, mY + 1);

      // === Глаз — миндалевидный, мёртвый янтарь, холодный взгляд ===========
      const eX = hX - 1;
      const eY = hY - 1;
      sg.fillStyle(C_VOID, 1);
      sg.fillRect(eX - 4, eY - 3, 9, 6);     // глазница — вдавленная впадина
      sg.fillStyle(C_AMBER, 1);
      sg.fillEllipse(eX, eY, 7, 4);           // янтарная радужка
      sg.fillStyle(C_VOID, 1);
      sg.fillRect(eX - 2, eY - 1, 5, 2);      // горизонтальный зрачок (не вертикальный — жутче)
      // Ни одного яркого блика — только тёмное тление
      sg.fillStyle(0x7a6008, 0.5);
      sg.fillRect(eX + 1, eY - 1, 1, 1);

      // === Корона — три готических шипа, железная бронза ====================
      const crX = hX - 5;   // ≈ 148
      const crY = hY - 16;  // ≈ 30

      // Тяжёлое основание — железный обруч
      sg.fillStyle(C_BRZ_S, 1);
      sg.fillRect(crX - 1, crY + 1, 18, 7);   // тень
      sg.fillStyle(C_BRONZE, 1);
      sg.fillRect(crX, crY, 16, 6);             // обруч
      sg.fillStyle(C_BRZ_H, 1);
      sg.fillRect(crX, crY, 16, 1);             // тусклый верхний блик
      sg.fillStyle(C_BRZ_S, 1);
      sg.fillRect(crX, crY + 5, 16, 1);         // нижняя тень

      // Три готических шипа: центральный выше — иерархия власти
      const spikes = [
        { dx: 1,  h: 12, gem: 0x500808 },   // рубин — почти чёрный
        { dx: 6,  h: 17, gem: 0x06062c },   // сапфир — почти чёрный
        { dx: 11, h: 12, gem: 0x063418 },   // изумруд — почти чёрный
      ];
      for (const s of spikes) {
        sg.fillStyle(C_BRZ_S, 1);
        sg.fillRect(crX + s.dx + 1, crY - s.h + 1, 3, s.h);  // тень шипа
        sg.fillStyle(C_BRONZE, 1);
        sg.fillRect(crX + s.dx, crY - s.h, 3, s.h);           // шип
        sg.fillStyle(C_BRZ_H, 1);
        sg.fillRect(crX + s.dx, crY - s.h, 1, s.h);           // левая грань (блик)
        sg.fillStyle(s.gem, 1);
        sg.fillRect(crX + s.dx, crY - s.h, 3, 4);             // самоцвет — тёмный камень
      }

      // Горизонтальная насечка-ободок, заклёпки
      sg.fillStyle(C_BRZ_S, 1);
      sg.fillRect(crX, crY + 3, 16, 1);
      sg.fillStyle(C_BRZ_H, 1);
      for (let px = crX + 2; px < crX + 15; px += 4) {
        sg.fillRect(px, crY + 3, 1, 1);   // заклёпки
      }

      // === Мундштук: кончик пасти для спавна купюр =========================
      this.cannonMuzzleBase = { x: mX + 3, y: mY + 2 };
    }

    // Прожектор на носу корабля — лампа чуть ниже палубной кромки
    this.beamOBase = { x: BOW_DECK_X + FACE_W - 2, y: 30 };
    this.beamGfx   = this.add.graphics().setDepth(18);

    // Фонари на набережной
    this.lampBodyGfx = this.add.graphics().setDepth(7);

    // Анимация натяжения: провис пульсирует 10↔34 — верёвка дышит под нагрузкой
    this.ropeSag = { v: 22 };
    this.tweens.add({
      targets: this.ropeSag,
      v: 8,
      duration: 380,
      yoyo: true,
      repeat: -1,
      ease: 'Sine.InOut',
    });

    // ── Таймеры состояния ─────────────────────────────────────────────────────
    // Здоровье убывает: -2/сек
    this.time.addEvent({
      delay: 1000, loop: true,
      callback: () => { this.state.health = Math.max(0, this.state.health - 2); },
    });
    // Каждые 20 сек: age++, speed -= 0.15 (лама стареет, замедляется)
    this.time.addEvent({
      delay: 20000, loop: true,
      callback: () => {
        if (this.state.age < 5) {
          this.state.age  += 1;
          this.state.speed = Math.max(0.1, this.state.speed - 0.15);
        }
      },
    });

    // ── Физическое освещение (Phaser Light2D) ────────────────────────────────
    this.lights.enable().setAmbientColor(0x0d1828);

    // Прожектор корабля: холодный ксенон, большой радиус
    this.spotLight = this.lights.addLight(
      this.beamOBase.x, this.beamOBase.y, 460, 0xb0ccf8, 3.2,
    );

    // Уличные фонари: тёплый янтарь, 5 источников (позиции пересчитываются каждый кадр)
    this.lampLights = [];
    for (let i = 0; i < 5; i++) {
      this.lampLights.push(this.lights.addLight(i * 336, this.GY - 24, 105, 0xffcc60, 2.2));
    }

    // ── Пул купюр (макс. 8) ──────────────────────────────────────────────────
    this.banknotes    = [];
    this.banknoteIdx  = 0;          // round-robin: следующий слот
    this.bnTimer      = 0;
    this.bnDelay      = Phaser.Math.Between(2000, 4000);

    for (let i = 0; i < 8; i++) {
      const gfx = this.add.graphics().setDepth(20).setVisible(false);
      // Рисуем купюру один раз — перемещаем через gfx.x / gfx.y
      gfx.fillStyle(0xc0392b, 1);
      gfx.fillRect(-14, -7, 28, 14);
      gfx.fillStyle(0xd4af37, 0.7);
      gfx.fillRect(-14, -1, 28, 2);          // золотая полоса
      gfx.lineStyle(1, 0xe85d4a, 1);
      gfx.strokeRect(-13, -6, 26, 12);

      const txt = this.add.text(0, 0, '5000', {
        fontSize: '6px', fontFamily: 'monospace', color: '#ffffff',
      }).setDepth(21).setOrigin(0.5, 0.5).setVisible(false);

      this.banknotes.push({ gfx, txt, x: 0, y: 0, state: 'idle', chain: null });
    }

    // Все видимые объекты → Light2D pipeline
    [
      this.tl4, this.tl3, this.tl2, this.tl1,
      this.boatGfx, this.llamaBody, this.harnessGfx,
      this.legBL, this.legBR, this.legFL, this.legFR,
      this.ropeGfx, this.waveGfx, this.lampBodyGfx, this.snakeGfx,
      ...this.banknotes.map(b => b.gfx),
    ].forEach(obj => obj.setPipeline('Light2D'));
  }

  spawnBanknote() {
    const slot = this.banknotes[this.banknoteIdx];
    this.banknoteIdx = (this.banknoteIdx + 1) % this.banknotes.length;

    if (slot.chain) slot.chain.stop();

    const sx = this.cannonMuzzleBase.x + this.boatBob.x;
    const sy = this.cannonMuzzleBase.y + this.boatBob.y;
    slot.x = sx;  slot.y = sy;
    slot.state = 'flying';
    slot.gfx.setVisible(true);
    slot.txt.setVisible(true);

    const riverY = this.waterY + 8;
    const W = this.scale.width;

    slot.chain = this.tweens.chain({
      tweens: [
        {
          // фаза 1: летит по углу носа корабля (~14° вниз от горизонтали)
          targets: slot, x: sx + 110, y: sy + 28,
          duration: 360, ease: 'Quad.Out',
        },
        {
          // фаза 2: падает в воду у правого края экрана (чуть за экраном)
          targets: slot, x: W + 18, y: riverY,
          duration: 430, ease: 'Quad.In',
          onComplete: () => { slot.state = 'floating'; },
        },
      ],
    });
  }

  update(_time, delta) {
    const dt  = delta / 1000;
    const spd = this.state.speed;

    // Все слои масштабируются на speed — мир замедляется вместе с ламой
    this.tl4.tilePositionX += BASE_SPEED * 0.1 * spd * dt;
    this.tl3.tilePositionX += BASE_SPEED * 0.3 * spd * dt;
    this.tl2.tilePositionX += BASE_SPEED * 1.0 * spd * dt;
    this.tl1.tilePositionX += BASE_SPEED * 1.0 * spd * dt;

    // Синусоидная граница воды
    // Две наложенных волны с разными частотами → органичный, не механический рисунок
    this.waveTime += dt;
    const wt      = this.waveTime;
    const baseY   = this.waterY;
    const sceneW  = this.scale.width;
    const AMP     = 3;    // амплитуда ±3px
    const FREQ1   = 0.040, SPD1 = 1.1;   // основная волна
    const FREQ2   = 0.071, SPD2 = 0.65;  // вторичная, сдвигает форму
    // Цвет воды у ватерлинии (верхний градиент тайла) и асфальт у края дороги
    const C_WATER = 0x183f5c;
    const C_ROAD  = 0x282826;

    this.waveGfx.clear();
    for (let x = 0; x < sceneW; x++) {
      const dy = Math.round(
        AMP * Math.sin(x * FREQ1 + wt * SPD1) +
        (AMP * 0.5) * Math.sin(x * FREQ2 - wt * SPD2),
      );
      const edgeY = baseY + dy;
      if (dy < 0) {
        // волна выше ватерлинии — заполняем водой
        this.waveGfx.fillStyle(C_WATER, 1);
        this.waveGfx.fillRect(x, edgeY, 1, -dy);
      } else if (dy > 0 && x >= this.shipEdgeX) {
        // волна ниже ватерлинии — заполняем дорогой (не в зоне корабля)
        this.waveGfx.fillStyle(C_ROAD, 1);
        this.waveGfx.fillRect(x, baseY, 1, dy);
      }
    }

    // ── Фонари на набережной ──────────────────────────────────────────────────
    {
      const TILE_W  = 336;   // период расстановки фонарей (каждые 3 тайла дороги)
      const LX_TILE = 112;   // смещение фонаря внутри периода
      const baseY   = this.GY;
      const headY   = baseY - 26;   // высота головки фонаря
      const tilePos = this.tl2.tilePositionX;
      const startX  = ((LX_TILE - tilePos % TILE_W) % TILE_W + TILE_W) % TILE_W;

      this.lampBodyGfx.clear();
      // Начинаем на период раньше экрана — свет плавно уходит за край, не обрезается
      for (let lx = startX - TILE_W; lx < sceneW + TILE_W; lx += TILE_W) {
        // Столб
        this.lampBodyGfx.fillStyle(0x242230, 1);
        this.lampBodyGfx.fillRect(lx - 1, headY + 5, 2, baseY - headY - 5);
        // Кронштейн
        this.lampBodyGfx.fillStyle(0x1e1c28, 1);
        this.lampBodyGfx.fillRect(lx - 1, headY + 4, 5, 1);
        // Корпус фонаря
        this.lampBodyGfx.fillStyle(0x2a2840, 1);
        this.lampBodyGfx.fillRect(lx - 3, headY, 7, 5);
        // Стекло — тёплое янтарное
        this.lampBodyGfx.fillStyle(0xffd870, 1);
        this.lampBodyGfx.fillRect(lx - 2, headY + 1, 5, 3);
      }

      // Обновляем позиции точечных источников (включая заэкранные)
      for (let i = 0; i < this.lampLights.length; i++) {
        this.lampLights[i].x = startX - TILE_W + i * TILE_W;
        this.lampLights[i].y = headY;
      }
    }

    // Прожектор: обновляем позицию источника (следует за качанием корабля)
    this.spotLight.x = this.beamOBase.x + this.boatBob.x;
    this.spotLight.y = this.beamOBase.y + this.boatBob.y;
    this.beamGfx.clear();

    // Скорость анимации ног = скорость движения
    this.walkTween1.timeScale = spd;
    this.walkTween2.timeScale = spd;

    // Корабль и пушка покачиваются вместе
    this.boatGfx.x  = this.boatBob.x;
    this.boatGfx.y  = this.boatBob.y;
    this.snakeGfx.x = this.boatBob.x;
    this.snakeGfx.y = this.boatBob.y;

    // Кнехт двигается вместе с корпусом — обновляем точку крепления верёвки
    this.ropeBoat.x = this.knechtBase.x + this.boatBob.x;
    this.ropeBoat.y = this.knechtBase.y + this.boatBob.y;

    // ── Купюры ────────────────────────────────────────────────────────────────
    this.bnTimer += delta;
    if (this.bnTimer >= this.bnDelay) {
      this.bnTimer = 0;
      this.bnDelay = Phaser.Math.Between(2000, 4000);
      this.spawnBanknote();
    }
    for (const bn of this.banknotes) {
      if (bn.state === 'idle') continue;
      if (bn.state === 'floating') {
        bn.x -= BASE_SPEED * spd * dt;
        if (bn.x < -40) {
          bn.state = 'idle';
          bn.gfx.setVisible(false);
          bn.txt.setVisible(false);
          continue;
        }
      }
      bn.gfx.x = Math.round(bn.x);
      bn.gfx.y = Math.round(bn.y);
      bn.txt.x  = Math.round(bn.x);
      bn.txt.y  = Math.round(bn.y);
    }

    // Верёвка: квадратичная кривая с анимированным провисом
    // Натяжение пульсирует через tween ropeSag.v — эффект живой тяги
    const { x: nx, y: ny } = this.ropeNeck;
    const { x: bx, y: by } = this.ropeBoat;
    const cpx = nx + (bx - nx) * 0.42;
    const cpy = (ny + by) / 2 + this.ropeSag.v;

    const drawRopeCurve = (ox, oy) => {
      this.ropeGfx.beginPath();
      this.ropeGfx.moveTo(nx + ox, ny + oy);
      const STEPS = 20;
      for (let i = 1; i <= STEPS; i++) {
        const t = i / STEPS, mt = 1 - t;
        this.ropeGfx.lineTo(
          mt * mt * (nx + ox) + 2 * mt * t * (cpx + ox) + t * t * (bx + ox),
          mt * mt * (ny + oy) + 2 * mt * t * (cpy + oy) + t * t * (by + oy),
        );
      }
      this.ropeGfx.strokePath();
    };

    this.ropeGfx.clear();
    // Тень (имитирует толщину верёвки и ощущение веса)
    this.ropeGfx.lineStyle(3, 0x3a1e08, 1);
    drawRopeCurve(0, 1);
    // Основная верёвка
    this.ropeGfx.lineStyle(2, 0xb08030, 1);
    drawRopeCurve(0, 0);
    // Бликующий волосок (ощущение натяжения)
    this.ropeGfx.lineStyle(1, 0xd8b060, 1);
    drawRopeCurve(-0.5, -0.5);
  }
}

// ─── Phaser config ────────────────────────────────────────────────────────────

const config = {
  type: Phaser.AUTO,
  width: 480,
  height: 270,
  backgroundColor: '#060608',
  scene: [GameScene],
  scale: {
    mode: Phaser.Scale.EXPAND,
    autoCenter: Phaser.Scale.CENTER_BOTH,
  },
  // Увеличиваем лимит источников: 1 прожектор + ~8 фонарей + запас
  render: { maxLights: 16 },
};

new Phaser.Game(config);
</script>

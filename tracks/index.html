<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Треки | Ламопад</title>
  <meta name="description" content="Все треки Ламопада — тексты и игры">
  <link rel="canonical" href="/tracks/">
  <link rel="icon" href="/favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:    #0b1220;
      --navy:  #162848;
      --amber: #c8900a;
      --gold:  #e8b030;
      --text:  #a09278;
      --dim:   #3a3020;
      --font:  'Cormorant Garamond', Georgia, serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 50% 60% at 15% 55%, rgba(200,144,10,0.13) 0%, transparent 65%),
        radial-gradient(ellipse 35% 45% at 80% 20%, rgba(200,144,10,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 65% 30% at 50% 100%, rgba(22,40,72,0.7) 0%, transparent 70%);
      color: var(--text);
      font-family: var(--font);
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: url('/img/lamopad_cursor_48px.png') 0 0, auto;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(8,10,18,0.75) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── clouds ───────────────────────────────────────── */
    .clouds {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .cloud {
      position: absolute;
      border-radius: 50%;
      filter: blur(72px);
    }
    .cloud-1 {
      width: 55vw; height: 35vh;
      background: radial-gradient(ellipse, rgba(200,144,10,0.14) 0%, transparent 70%);
      top: 5%; left: -10%;
      animation: drift1 24s ease-in-out infinite;
    }
    .cloud-2 {
      width: 40vw; height: 45vh;
      background: radial-gradient(ellipse, rgba(22,40,72,0.40) 0%, transparent 70%);
      top: 30%; right: -5%;
      animation: drift2 30s ease-in-out infinite;
    }
    .cloud-3 {
      width: 65vw; height: 28vh;
      background: radial-gradient(ellipse, rgba(160,146,120,0.09) 0%, transparent 70%);
      bottom: 15%; left: 15%;
      animation: drift3 36s ease-in-out infinite;
    }

    @keyframes drift1 {
      0%,100% { transform: translate(0,0) scale(1); }
      40%     { transform: translate(10vw,7vh) scale(1.07); }
      70%     { transform: translate(-5vw,13vh) scale(0.95); }
    }
    @keyframes drift2 {
      0%,100% { transform: translate(0,0) scale(1); }
      35%     { transform: translate(-12vw,-8vh) scale(1.09); }
      65%     { transform: translate(-6vw,9vh) scale(0.93); }
    }
    @keyframes drift3 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%     { transform: translate(8vw,-10vh) scale(1.04); }
    }

    @media (prefers-reduced-motion: reduce) {
      .cloud { animation: none; }
    }

    /* ── layout ───────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 12vh 24px 12vh;
    }

    /* ── header ───────────────────────────────────────── */
    .header {
      margin-bottom: 72px;
    }

    .label {
      font-size: clamp(10px, 2vw, 12px);
      letter-spacing: .32em;
      text-transform: uppercase;
      color: var(--dim);
      font-weight: 400;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(36px, 10vw, 72px);
      font-weight: 300;
      color: var(--amber);
      letter-spacing: .04em;
      line-height: 1;
    }

    /* ── track list ───────────────────────────────────── */
    .tracklist {
      list-style: none;
      display: flex;
      flex-direction: column;
    }

    .track {
      display: flex;
      align-items: baseline;
      gap: 18px;
      padding: 22px 0;
      border-bottom: 1px solid rgba(200,144,10,0.08);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .track.visible {
      opacity: 1;
      transform: none;
    }

    .track-num {
      font-size: clamp(11px, 2vw, 13px);
      letter-spacing: .18em;
      color: var(--dim);
      min-width: 24px;
      font-weight: 400;
      padding-top: 3px;
      user-select: none;
    }

    .track-body {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 10px 20px;
    }

    .track-name {
      font-size: clamp(22px, 5.5vw, 36px);
      font-weight: 300;
      color: var(--text);
      letter-spacing: .02em;
      line-height: 1.15;
      transition: color 0.2s;
    }

    .track:hover .track-name {
      color: var(--gold);
    }

    .track-links {
      display: flex;
      gap: 10px;
      align-items: center;
      padding-bottom: 2px;
    }

    .track-link {
      font-size: clamp(10px, 1.8vw, 11px);
      letter-spacing: .22em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--dim);
      border: 1px solid var(--dim);
      padding: 3px 8px;
      transition: color .2s, border-color .2s;
    }

    .track-link:hover {
      color: var(--amber);
      border-color: var(--amber);
    }

    /* ── footer ───────────────────────────────────────── */
    .footer {
      margin-top: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer a {
      font-size: clamp(11px, 2.2vw, 13px);
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--dim);
      text-decoration: none;
      transition: color .2s;
    }
    .footer a:hover { color: var(--amber); }

    .copyright {
      font-size: 12px;
      letter-spacing: .12em;
      color: var(--dim);
      user-select: none;
    }

    @media (max-width: 480px) {
      .page { padding: 10vh 18px 10vh; }
      .track { gap: 12px; padding: 18px 0; }
    }
  </style>
</head>
<body>

<div class="clouds">
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
</div>

<main class="page">

  <header class="header">
    <p class="label">Ламопад</p>
    <h1>Треки</h1>
  </header>

  <ol class="tracklist">

    <li class="track">
      <span class="track-num">01</span>
      <div class="track-body">
        <span class="track-name">АТГУЛ</span>
        <div class="track-links">
          <a class="track-link" href="/agu/text/">текст</a>
          <a class="track-link" href="/agu/game/">игра</a>
        </div>
      </div>
    </li>

    <li class="track">
      <span class="track-num">02</span>
      <div class="track-body">
        <span class="track-name">Самосвал</span>
        <div class="track-links">
          <a class="track-link" href="/samosval/text/">текст</a>
          <a class="track-link" href="/samosval/game/">игра</a>
        </div>
      </div>
    </li>

    <li class="track">
      <span class="track-num">03</span>
      <div class="track-body">
        <span class="track-name">Осень, девять</span>
        <div class="track-links">
          <a class="track-link" href="/osen-9/text/">текст</a>
        </div>
      </div>
    </li>

    <li class="track">
      <span class="track-num">04</span>
      <div class="track-body">
        <span class="track-name">Летай</span>
        <div class="track-links">
          <a class="track-link" href="/fly/text/">текст</a>
        </div>
      </div>
    </li>

    <li class="track">
      <span class="track-num">05</span>
      <div class="track-body">
        <span class="track-name">Приходи в мой дом</span>
        <div class="track-links">
          <a class="track-link" href="/come-to-my-home/text/">текст</a>
        </div>
      </div>
    </li>

    <li class="track">
      <span class="track-num">06</span>
      <div class="track-body">
        <span class="track-name">Шмурдики</span>
        <div class="track-links">
          <a class="track-link" href="/shmurdiki/text/">текст</a>
        </div>
      </div>
    </li>

  </ol>

  <footer class="footer">
    <a href="/">ламопад.рф</a>
    <p class="copyright">© Ламопад — все права защищены</p>
  </footer>

</main>

<script>
(function () {
  /* staggered entrance */
  const tracks = document.querySelectorAll('.track');
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    tracks.forEach(t => t.classList.add('visible'));
    return;
  }
  tracks.forEach((t, i) => {
    setTimeout(() => t.classList.add('visible'), 80 + i * 90);
  });
})();
</script>

</body>
</html>
